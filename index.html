<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图文广告店 ERP 管理系统</title>
<style>
  :root {
    --primary: #3B6DE8;
    --primary-light: #EEF2FF;
    --primary-dark: #2952C4;
    --success: #2E9E6B;
    --success-light: #E8F8F0;
    --warning: #D4860B;
    --warning-light: #FFF8EA;
    --danger: #DC3545;
    --danger-light: #FDECEA;
    --info: #0A7ABA;
    --info-light: #E6F3FA;
    --gray-50: #F8F9FC;
    --gray-100: #F1F3F8;
    --gray-200: #E2E6EF;
    --gray-300: #C8CFDF;
    --gray-400: #9AA3B5;
    --gray-500: #6B7489;
    --gray-600: #4A5168;
    --gray-700: #333A50;
    --gray-800: #1E2335;
    --sidebar-w: 220px;
    --header-h: 56px;
    --radius: 8px;
    --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; font-size: 14px; color: var(--gray-800); background: var(--gray-50); }
  a { text-decoration: none; color: inherit; }

  /* Login */
  #loginPage { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #3B6DE8 0%, #1E2335 100%); }
  .login-card { background: #fff; border-radius: 16px; padding: 48px 40px; width: 400px; box-shadow: 0 24px 60px rgba(0,0,0,.18); }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo .logo-icon { width: 56px; height: 56px; background: var(--primary); border-radius: 14px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 12px; }
  .login-logo .logo-icon svg { width: 28px; height: 28px; fill: #fff; }
  .login-logo h1 { font-size: 20px; font-weight: 600; color: var(--gray-800); }
  .login-logo p { font-size: 13px; color: var(--gray-500); margin-top: 4px; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--gray-600); margin-bottom: 6px; }
  .form-group input, .form-group select { width: 100%; padding: 10px 14px; border:1.5px solid var(--gray-200); border-radius: var(--radius); font-size: 14px; transition: border-color .2s; outline: none; }
  .form-group input:focus, .form-group select:focus { border-color: var(--primary); }
  .btn-primary { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 500; cursor: pointer; transition: background .2s; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-primary:disabled { background: var(--gray-300); cursor: not-allowed; }
  .login-hint { margin-top: 16px; text-align: center; font-size: 12px; color: var(--gray-400); }
  .login-toggle { margin-top: 12px; text-align: center; font-size: 13px; color: var(--primary); cursor: pointer; }
  .login-toggle:hover { text-decoration: underline; }
  .login-error { margin-top: 12px; text-align: center; font-size: 13px; color: var(--danger); display: none; }

  /* App layout */
  #app { display: none; min-height: 100vh; }
  .sidebar { position: fixed; top: 0; left: 0; width: var(--sidebar-w); height: 100vh; background: var(--gray-800); display: flex; flex-direction: column; z-index: 100; }
  .sidebar-header { padding: 18px 16px; border-bottom:1px solid rgba(255,255,255,.08); }
  .sidebar-header .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon { width: 36px; height: 36px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .brand-icon svg { width: 18px; height: 18px; fill: #fff; }
  .brand-name { color: #fff; font-weight: 600; font-size: 15px; line-height: 1.2; }
  .brand-sub { color: var(--gray-400); font-size: 11px; }
  .sidebar-nav { flex: 1; padding: 12px 8px; overflow-y: auto; }
  .nav-section { margin-bottom: 4px; }
  .nav-section-title { font-size: 10px; font-weight: 600; color: var(--gray-500); letter-spacing: .08em; padding: 8px 8px 4px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: var(--radius); cursor: pointer; color: var(--gray-300); transition: all .15s; margin-bottom: 2px; }
  .nav-item:hover { background: rgba(255,255,255,.06); color: #fff; }
  .nav-item.active { background: var(--primary); color: #fff; }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .nav-item span { font-size: 13.5px; }
  .sidebar-footer { padding: 12px 8px; border-top:1px solid rgba(255,255,255,.08); }
  .user-info { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius); cursor: pointer; }
  .user-info:hover { background: rgba(255,255,255,.06); }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 600; font-size: 13px; flex-shrink: 0; }
  .user-detail .u-name { color: #fff; font-size: 13px; font-weight: 500; }
  .user-detail .u-role { color: var(--gray-400); font-size: 11px; }

  /* Main */
  .main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; }
  .topbar { height: var(--header-h); background: #fff; border-bottom:1px solid var(--gray-200); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 50; }
  .topbar-title { font-size: 16px; font-weight: 600; color: var(--gray-800); }
  .topbar-actions { display: flex; gap: 8px; }
  .content { padding: 24px; }

  /* Cards & Tables */
  .card { background: #fff; border-radius: var(--radius-lg); box-shadow: 0 1px 3px rgba(0,0,0,.06); padding: 20px; margin-bottom: 20px; }
  .card-title { font-size: 15px; font-weight: 600; color: var(--gray-800); margin-bottom: 16px; }
  .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .search-box { position: relative; flex: 1; min-width: 200px; }
  .search-box input { width: 100%; padding: 8px 12px 8px 34px; border: 1.5px solid var(--gray-200); border-radius: var(--radius); font-size: 13px; outline: none; }
  .search-box input:focus { border-color: var(--primary); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--gray-400); display: flex; }
  .search-icon svg { width: 16px; height: 16px; fill: currentColor; }
  .filter-select { padding: 8px 12px; border: 1.5px solid var(--gray-200); border-radius: var(--radius); font-size: 13px; outline: none; background: #fff; }
  .filter-select:focus { border-color: var(--primary); }
  .btn { padding: 8px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-outline { background: #fff; color: var(--gray-600); border: 1.5px solid var(--gray-200); }
  .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #c82333; }
  .btn-ghost { background: transparent; color: var(--primary); padding: 4px 8px; font-size: 12.5px; }
  .btn-ghost:hover { background: var(--primary-light); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 10px 12px; text-align: left; font-size: 12px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: .04em; border-bottom: 2px solid var(--gray-200); background: var(--gray-50); }
  td { padding: 12px; font-size: 13px; color: var(--gray-700); border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
  tr:hover td { background: var(--gray-50); }
  .badge { padding: 3px 10px; border-radius: 20px; font-size: 11.5px; font-weight: 600; }
  .badge-yellow { background: var(--warning-light); color: var(--warning); }
  .badge-blue { background: var(--info-light); color: var(--info); }
  .badge-green { background: var(--success-light); color: var(--success); }
  .badge-gray { background: var(--gray-100); color: var(--gray-500); }
  .badge-cyan { background: #E0F7FA; color: #006064; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px; flex-shrink: 0; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: #fff; border-radius: var(--radius-lg); box-shadow: 0 1px 3px rgba(0,0,0,.06); padding: 20px; display: flex; align-items: center; gap: 16px; }
  .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .stat-icon svg { width: 22px; height: 22px; }
  .stat-body .stat-value { font-size: 24px; font-weight: 700; color: var(--gray-800); line-height: 1.2; }
  .stat-body .stat-label { font-size: 12px; color: var(--gray-500); margin-top: 2px; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: var(--radius-lg); width: 560px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.18); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--gray-100); }
  .modal-title { font-size: 15px; font-weight: 600; }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--gray-400); display: flex; padding: 4px; border-radius: 4px; }
  .modal-close:hover { background: var(--gray-100); }
  .modal-body { padding: 20px; }
  .modal-footer { padding: 16px 20px; border-top: 1px solid var(--gray-100); display: flex; justify-content: flex-end; gap: 8px; }
  .form-row { display: flex; gap: 16px; margin-bottom: 14px; }
  .form-field { flex: 1; }
  .form-field label { display: block; font-size: 12px; font-weight: 500; color: var(--gray-600); margin-bottom: 5px; }
  .form-field input, .form-field select, .form-field textarea { width: 100%; padding: 8px 12px; border: 1.5px solid var(--gray-200); border-radius: 6px; font-size: 13px; outline: none; font-family: inherit; }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color: var(--primary); }
  .form-field textarea { resize: vertical; min-height: 60px; }
  .required { color: var(--danger); }

  /* Toast */
  #toast { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast-item { padding: 12px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 500; color: #fff; box-shadow: 0 4px 12px rgba(0,0,0,.15); animation: slideIn .3s ease; }
  .toast-item.success { background: var(--success); }
  .toast-item.error { background: var(--danger); }
  .toast-item.info { background: var(--info); }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-400); }
  .empty-state h3 { font-size: 16px; color: var(--gray-600); margin-bottom: 8px; }
  .loading-mask { display: flex; align-items: center; justify-content: center; padding: 80px; color: var(--gray-400); gap: 8px; }

  /* Dashboard charts */
  .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .chart-card { background: #fff; border-radius: var(--radius-lg); box-shadow: 0 1px 3px rgba(0,0,0,.06); padding: 20px; }
  .chart-card .chart-title { font-size: 14px; font-weight: 600; color: var(--gray-700); margin-bottom: 12px; }
  .chart-card canvas { max-height: 260px; }
  .chart-full { grid-column: 1 / -1; }

  /* Progress bar */
  .progress-steps { display: flex; align-items: center; gap: 0; padding: 6px 0; }
  .progress-step { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; position: relative; }
  .progress-step::after { content: ''; position: absolute; top: 14px; left: 50%; width: 100%; height: 3px; background: var(--gray-200); z-index: 0; }
  .progress-step:last-child::after { display: none; }
  .progress-step .step-dot { width: 28px; height: 28px; border-radius: 50%; background: var(--gray-200); display: flex; align-items: center; justify-content: center; z-index: 1; font-size: 12px; font-weight: 600; color: #fff; transition: all .3s; }
  .progress-step.active .step-dot { background: var(--primary); }
  .progress-step.done .step-dot { background: var(--success); }
  .progress-step .step-label { font-size: 10px; color: var(--gray-400); text-align: center; line-height: 1.2; }
  .progress-step.active .step-label, .progress-step.done .step-label { color: var(--gray-700); font-weight: 500; }
  .progress-step.active::after, .progress-step.done::after { background: var(--success); }

  /* Notifications */
  .notif-container { position: relative; }
  .notif-bell { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; background: transparent; color: var(--gray-500); transition: all .15s; position: relative; }
  .notif-bell:hover { background: var(--gray-100); color: var(--gray-700); }
  .notif-bell svg { width: 18px; height: 18px; }
  .notif-badge { position: absolute; top: 3px; right: 3px; min-width: 16px; height: 16px; border-radius: 8px; background: var(--danger); color: #fff; font-size: 10px; font-weight: 600; display: none; align-items: center; justify-content: center; padding: 0 4px; }
  .notif-badge.show { display: flex; }
  .notif-dropdown { display: none; position: absolute; top: 44px; right: 0; width: 340px; background: #fff; border-radius: var(--radius-lg); box-shadow: 0 12px 40px rgba(0,0,0,.15); z-index: 200; max-height: 400px; overflow-y: auto; }
  .notif-dropdown.open { display: block; }
  .notif-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--gray-100); }
  .notif-header h4 { font-size: 14px; font-weight: 600; }
  .notif-header .notif-clear { font-size: 12px; color: var(--primary); cursor: pointer; background: none; border: none; }
  .notif-item { padding: 12px 16px; border-bottom: 1px solid var(--gray-50); cursor: pointer; transition: background .15s; }
  .notif-item:hover { background: var(--gray-50); }
  .notif-item.unread { background: var(--primary-light); }
  .notif-item .notif-text { font-size: 13px; color: var(--gray-700); margin-bottom: 2px; }
  .notif-item .notif-time { font-size: 11px; color: var(--gray-400); }
  .notif-empty { text-align: center; padding: 30px; color: var(--gray-400); font-size: 13px; }

  /* Mobile bottom nav */
  .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid var(--gray-200); z-index: 150; padding: 4px 0 env(safe-area-inset-bottom, 8px); }
  .mobile-nav-inner { display: flex; justify-content: space-around; }
  .mobile-nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 10px; cursor: pointer; color: var(--gray-400); font-size: 10px; border: none; background: none; transition: color .15s; }
  .mobile-nav-item svg { width: 20px; height: 20px; }
  .mobile-nav-item.active { color: var(--primary); }

  /* Hamburger */
  .hamburger { display: none; width: 36px; height: 36px; border-radius: 8px; align-items: center; justify-content: center; cursor: pointer; border: none; background: transparent; color: var(--gray-600); }
  .hamburger:hover { background: var(--gray-100); }
  .hamburger svg { width: 20px; height: 20px; }
  .sidebar.open-mobile { display: flex !important; }

  /* Print */
  @media print {
    .sidebar, .topbar, .btn, .toolbar button, .toolbar select, .toolbar input,
    .mobile-nav, .notif-container, .hamburger, .nav-item, .modal-overlay, #toast { display: none !important; }
    .main { margin-left: 0 !important; }
    .content { padding: 0 !important; }
    .card { box-shadow: none !important; border: 1px solid #ddd !important; break-inside: avoid; }
    .stats-grid { grid-template-columns: repeat(4, 1fr) !important; }
    table { font-size: 11px; }
    th, td { padding: 6px !important; }
    .badge { border: 1px solid #999 !important; background: none !important; color: #333 !important; }
    body { background: #fff !important; }
  }
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .sidebar.open-mobile { display: flex !important; position: fixed; z-index: 200; }
    .main { margin-left: 0; }
    .chart-row { grid-template-columns: 1fr; }
    .form-row { flex-direction: column; gap: 0; }
    .hamburger { display: flex; }
    .mobile-nav { display: block; }
    .content { padding: 16px 12px 80px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .stat-card { padding: 14px; }
    .stat-body .stat-value { font-size: 18px; }
    .modal { width: 95vw; max-width: 560px; }
    .topbar { padding: 0 12px; }
    .toolbar { flex-direction: column; align-items: stretch; }
    .btn { justify-content: center; }
    .notif-dropdown { width: 280px; right: -60px; }
  }
</style>
</head>
<body>

<!-- 登录页 -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
      </div>
      <h1>图文广告店 ERP</h1>
      <p>Supabase 云端版</p>
    </div>
    <div id="loginForm">
      <div class="form-group">
        <label>账号</label>
        <input type="text" id="loginEmail" placeholder="请输入账号名" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPass" placeholder="请输入密码" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div id="loginError" class="login-error"></div>
      <button class="btn-primary" id="loginBtn" onclick="doLogin()">登 录</button>
      <div class="login-toggle" onclick="showRegister()">没有账号？点击注册</div>
    </div>
    <div id="registerForm" style="display:none">
      <div class="form-group">
        <label>账号名（仅限字母、数字、下划线）</label>
        <input type="text" id="regEmail" placeholder="例如：zhangsan 或 staff01" autocomplete="username" onkeydown="if(event.key==='Enter')doRegister()">
      </div>
      <div class="form-group">
        <label>姓名（显示用）</label>
        <input type="text" id="regName" placeholder="例如：张三" onkeydown="if(event.key==='Enter')doRegister()">
      </div>
      <div class="form-group">
        <label>密码（至少6位）</label>
        <input type="password" id="regPass" placeholder="请输入密码" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()">
      </div>
      <div class="form-group">
        <label>确认密码</label>
        <input type="password" id="regPass2" placeholder="请再次输入密码" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()">
      </div>
      <div id="regError" class="login-error"></div>
      <button class="btn-primary" id="regBtn" onclick="doRegister()">注 册</button>
      <div class="login-toggle" onclick="hideRegister()">已有账号？返回登录</div>
    </div>
  </div>
</div>

<!-- 主应用 -->
<div id="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
        </div>
        <div>
          <div class="brand-name">图文广告 ERP</div>
          <div class="brand-sub">v2.0 · Supabase云端版</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">概览</div>
        <div class="nav-item active" data-page="dashboard" onclick="switchPage('dashboard')">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
          <span>工作台</span>
        </div>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">业务</div>
        <div class="nav-item" data-page="customer" onclick="switchPage('customer')">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
          <span>客户管理</span>

function initApp() {

  supabase.auth.getSession().then(function(res) {
    var session = res.data.session;
    if (session) {
      loadUserAndShowApp(session.user);
    }
  });

    if (!session) {
      document.getElementById('app').style.display = 'none';
      document.getElementById('loginPage').style.display = 'flex';
      currentUser = null;

function usernameToEmail(username) {
  var clean = username.toLowerCase().replace(/[^a-z0-9_\-]/g, '');
  return clean + '@erp.localhost';
}

function doLogin() {
  var username = document.getElementById('loginEmail').value.trim();
  var pass  = document.getElementById('loginPass').value;
  var btn   = document.getElementById('loginBtn');
  var errEl = document.getElementById('loginError');
  if (!username || !pass) { errEl.textContent = '请输入账号和密码'; errEl.style.display = 'block'; return; }
  if (!/^[a-zA-Z0-9_\-]{2,30}$/.test(username)) { errEl.textContent = '账号名只能包含字母、数字、下划线，长度2-30位'; errEl.style.display = 'block'; return; }
  btn.disabled = true;
  btn.textContent = '登录中...';
  errEl.style.display = 'none';
  var email = usernameToEmail(username);
  supabase.auth.signInWithPassword({ email: email, password: pass }).then(function(res) {
    btn.disabled = false;
    btn.textContent = '登 录';
    if (res.error) { errEl.textContent = '账号或密码错误，请重试'; errEl.style.display = 'block'; return; }
    loadUserAndShowApp(res.data.user);
  });
}

function showRegister() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('registerForm').style.display = 'block';
  document.getElementById('regError').style.display = 'none';
}
function hideRegister() {
  document.getElementById('registerForm').style.display = 'none';
  document.getElementById('loginForm').style.display = 'block';
  document.getElementById('loginError').style.display = 'none';
}

function doRegister() {
  var username = document.getElementById('regEmail').value.trim();
  var realname = document.getElementById('regName').value.trim();
  var pass  = document.getElementById('regPass').value;
  var pass2 = document.getElementById('regPass2').value;
  var errEl = document.getElementById('regError');
  if (!username) { errEl.textContent = '请输入账号名'; errEl.style.display = 'block'; return; }
  if (!/^[a-zA-Z0-9_\-]{2,30}$/.test(username)) { errEl.textContent = '账号名只能包含字母、数字、下划线，长度2-30位'; errEl.style.display = 'block'; return; }
  if (!realname) { errEl.textContent = '请输入姓名'; errEl.style.display = 'block'; return; }
  if (!pass) { errEl.textContent = '请输入密码'; errEl.style.display = 'block'; return; }
  if (pass.length < 6) { errEl.textContent = '密码至少6位'; errEl.style.display = 'block'; return; }
  if (pass !== pass2) { errEl.textContent = '两次密码不一致'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  var btn = document.getElementById('regBtn');
  btn.disabled = true;
  btn.textContent = '注册中...';
  var email = usernameToEmail(username);
  supabase.auth.signUp({
    email: email,
    password: pass,
    options: { data: { name: realname, username: username, role: 'staff' } }
  }).then(function(res) {
    btn.disabled = false;
    btn.textContent = '注 册';
    if (res.error) {
      var msg = res.error.message;
      if (msg.indexOf('already') !== -1 || msg.indexOf('exists') !== -1) {
        errEl.textContent = '该账号名已被注册，请换一个';
      } else {
        errEl.textContent = '注册失败：' + msg;
      }
      errEl.style.display = 'block';
      return;
    }
    if (res.data.session) {
      loadUserAndShowApp(res.data.user);
    } else {
      alert('注册成功！请直接登录。');
      hideRegister();
    }
  });
}

function loadUserAndShowApp(user) {
  var meta = user.user_metadata || {};
  var displayName = meta.name || meta.username || (user.email || '').replace('@erp.localhost', '') || '用户';
  currentUser = {
    id: user.id,
    email: user.email,
    name: displayName,
    username: meta.username || (user.email || '').replace('@erp.localhost', ''),
    role: meta.role || 'staff'
  };
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('sidebarAvatar').textContent = (currentUser.name || '?')[0].toUpperCase();
  document.getElementById('sidebarName').textContent = currentUser.name;
  document.getElementById('sidebarRole').textContent = ROLES[currentUser.role] || currentUser.role;

  // 权限过滤侧边栏
  applyRoleFilter();

  switchPage('dashboard');
  updateNotifBadge();
  toast('欢迎，' + currentUser.name + '！');
}

function applyRoleFilter() {
  // 隐藏非管理员不可见的导航项
  document.querySelectorAll('.nav-item[data-role]').forEach(function(el) {
    var required = el.getAttribute('data-role');
    if (required === 'admin' && !isAdmin()) {
      el.style.display = 'none';
    } else {
      el.style.display = '';
    }
  });
}

function doLogout() {
  if (!confirm('确认退出登录？')) return;
  supabase.auth.signOut();
}

// ============================================================
//  工具函数
// ============================================================
function toast(msg, type) {
  type = type || 'success';
  var el = document.createElement('div');
  el.className = 'toast-item ' + type;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(function() {
    el.style.animation = 'slideOut .3s ease forwards';
    setTimeout(function() { el.remove(); }, 300);
  }, 2500);
}

function closeModal(id) {
  var el = document.getElementById(id);
  if (el) el.remove();
}

function fmtDate(s) {
  if (!s) return '-';
  var d = new Date(s);
  var y = d.getFullYear();
  var m = (d.getMonth() + 1).toString().padStart(2, '0');
  var day = d.getDate().toString().padStart(2, '0');
  return y + '-' + m + '-' + day;
}

function fmtMoney(n) {
  return '¥' + Number(n || 0).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function avatarColor(str) {
  var colors = ['#E53E3E','#D69E2E','#38A169','#3182CE','#805AD5','#DD6B20','#2B6CB0','#276749'];
  var h = 0;
  var s2 = str || '';
  for (var i = 0; i < s2.length; i++) h = s2.charCodeAt(i) + h * 31;
  return colors[Math.abs(h) % colors.length];
}

// ============================================================
//  权限控制
// ============================================================
function isAdmin() { return currentUser && currentUser.role === 'admin'; }

function hasPageAccess(page) {
  if (isAdmin()) return true;
  if (page === 'finance') return false; // staff 不能看财务
  return true;
}

// ============================================================
//  移动端侧边栏切换
// ============================================================
function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open-mobile');
}

// ============================================================
//  通知系统
// ============================================================
var notifications = [];
function loadNotifications() {
  try { notifications = JSON.parse(localStorage.getItem('erp_notifications') || '[]'); } catch(e) { notifications = []; }
}
loadNotifications();

function addNotification(text, type) {
  type = type || 'info';
  notifications.unshift({ text: text, type: type, time: new Date().toISOString(), read: false });
  if (notifications.length > 50) notifications = notifications.slice(0, 50);
  saveNotifications();
  updateNotifBadge();
}

function saveNotifications() {
  try { localStorage.setItem('erp_notifications', JSON.stringify(notifications)); } catch(e) {}
}

function updateNotifBadge() {
  var unread = notifications.filter(function(n) { return !n.read; }).length;
  var badge = document.getElementById('notifBadge');
  if (badge) {
    badge.textContent = unread;
    if (unread > 0) { badge.classList.add('show'); } else { badge.classList.remove('show'); }
  }
}

function renderNotifList() {
  var list = document.getElementById('notifList');
  if (!list) return;
  if (!notifications.length) {
    list.innerHTML = '<div class="notif-empty">暂无新消息</div>';
    return;
  }
  var html = '';
  notifications.forEach(function(n, i) {
    html += '<div class="notif-item' + (n.read ? '' : ' unread') + '" onclick="markNotifRead(' + i + ')">' +
      '<div class="notif-text">' + (n.read ? '' : '🔵 ') + n.text + '</div>' +
      '<div class="notif-time">' + fmtTimeAgo(n.time) + '</div></div>';
  });
  list.innerHTML = html;
}

function markNotifRead(idx) {
  notifications[idx].read = true;
  saveNotifications();
  updateNotifBadge();
  renderNotifList();
}

function clearAllNotifications(e) {
  if (e) e.stopPropagation();
  notifications = [];
  saveNotifications();
  updateNotifBadge();
  renderNotifList();
}

function toggleNotifications(e) {
  e.stopPropagation();
  var dd = document.getElementById('notifDropdown');
  var isOpen = dd.classList.contains('open');
  if (isOpen) { dd.classList.remove('open'); }
  else { renderNotifList(); dd.classList.add('open'); }
}

function fmtTimeAgo(s) {
  var diff = Date.now() - new Date(s).getTime();
  var mins = Math.floor(diff / 60000);
  if (mins < 1) return '刚刚';
  if (mins < 60) return mins + '分钟前';
  var hours = Math.floor(mins / 60);
  if (hours < 24) return hours + '小时前';
  return Math.floor(hours / 24) + '天前';
}

// 点击空白关闭通知面板
document.addEventListener('click', function(e) {
  var dd = document.getElementById('notifDropdown');
  if (dd && !e.target.closest('.notif-container')) { dd.classList.remove('open'); }
});
// 点击空白关闭移动端侧边栏
document.addEventListener('click', function(e) {

function printCurrentPage() {
  window.print();
}

function exportCSV(tableId, filename) {
  var table = document.getElementById(tableId);
  if (!table) { var cards = document.querySelectorAll('.card'); if (cards.length) { table = cards[cards.length - 1].querySelector('table'); } }
  if (!table) { toast('未找到可导出的表格', 'error'); return; }
  var rows = table.querySelectorAll('tr');
  var csv = [];
  rows.forEach(function(row) {
    var cols = row.querySelectorAll('th, td');
    var line = [];
    cols.forEach(function(col) {
      var text = (col.textContent || '').replace(/"/g, '""').replace(/\n/g, ' ').trim();
      line.push('"' + text + '"');
    });
    csv.push(line.join(','));
  });
  var BOM = '\uFEFF';
  var blob = new Blob([BOM + csv.join('\n')], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = (filename || 'export') + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('导出成功！');
  addNotification('导出文件：' + filename + '.csv');
}

//  图表渲染

var chartInstances = {};

function destroyCharts() {
  Object.keys(chartInstances).forEach(function(k) {
    if (chartInstances[k]) chartInstances[k].destroy();
    delete chartInstances[k];
  });
}

function switchPage(page) {
  // 权限检查
  if (!hasPageAccess(page)) { toast('您没有权限访问此页面', 'error'); return; }
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('active'); });
  var active = document.querySelector('.nav-item[data-page="' + page + '"]');
  if (active) active.classList.add('active');

  document.querySelectorAll('.mobile-nav-item').forEach(function(el) { el.classList.remove('active'); });
  var mactive = document.querySelector('.mobile-nav-item[data-mpage="' + page + '"]');
  if (mactive) mactive.classList.add('active');
  // 关闭移动端侧边栏
  document.querySelector('.sidebar').classList.remove('open-mobile');
  var titles = { dashboard:'工作台', customer:'客户管理', order:'订单管理', services:'服务项目', finance:'财务结算' };
  document.getElementById('topbarTitle').textContent = titles[page] || '';
  if (page === 'dashboard') renderDashboard();
  else if (page === 'customer') renderCustomers();
  else if (page === 'order') renderOrders();
  else if (page === 'services') renderServices();
  else if (page === 'finance') renderFinance();
}

//  仪表盘
// ============================================================
function renderDashboard() {
  var content = document.getElementById('pageContent');
  content.innerHTML = '<div class="loading-mask">加载中...</div>';
  destroyCharts();

  Promise.all([
    supabase.from('customers').select('id,balance,created_at'),
    supabase.from('orders').select('id,status,total,balance,created_at'),
    supabase.from('payments').select('amount,created_at')
  ]).then(function(results) {
    var customers = results[0].data || [];
    var orders = results[1].data || [];
    var payments = results[2].data || [];

    var totalRevenue = 0;
    payments.forEach(function(p) { totalRevenue += Number(p.amount || 0); });
    var pendingOrders = orders.filter(function(o) { return o.status === 'pending' || o.status === 'production'; });
    var totalReceivable = 0;
    orders.forEach(function(o) { totalReceivable += Number(o.balance || 0); });

    var html = '<div class="stats-grid">' +
      statCard('客户总数', customers.length, '#3B6DE8', 'people') +
      statCard('进行中订单', pendingOrders.length, '#0A7ABA', 'orders') +
      statCard('营业收入（已收）', fmtMoney(totalRevenue), '#2E9E6B', 'money') +
      statCard('应收未结金额', fmtMoney(totalReceivable), '#D4860B', 'receivable') +
    '</div>' +
    // 图表行
    '<div class="chart-row">' +
      '<div class="chart-card"><div class="chart-title">月度营收趋势（近6个月）</div><canvas id="chartRevenue"></canvas></div>' +
      '<div class="chart-card"><div class="chart-title">订单状态分布</div><canvas id="chartStatus"></canvas></div>' +
    '</div>' +
    // 打印导出按钮
    '<div style="display:flex;gap:8px;margin-bottom:16px">' +

function renderDashboardCharts(orders, payments) {
  // 月度营收趋势
  var months = [];
  var revData = [];
  var now = new Date();
  for (var i = 5; i >= 0; i--) {
    var d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push((d.getMonth() + 1) + '月');
    revData.push(0);
  }
  payments.forEach(function(p) {
    if (!p.created_at) return;
    var pd = new Date(p.created_at);
    var idx = 5 - (now.getFullYear() * 12 + now.getMonth() - pd.getFullYear() * 12 - pd.getMonth());
    if (idx >= 0 && idx < 6) revData[idx] += Number(p.amount || 0);
  });

  var ctx1 = document.getElementById('chartRevenue');
  if (ctx1) {
    chartInstances.revenue = new Chart(ctx1, {
      type: 'line',
      data: {
        labels: months,
        datasets: [{ label: '营收 (¥)', data: revData, borderColor: '#3B6DE8', backgroundColor: 'rgba(59,109,232,0.08)', fill: true, tension: 0.3, pointRadius: 4, pointBackgroundColor: '#3B6DE8' }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { callback: function(v) { return '¥' + v.toLocaleString(); } } } } }
    });
  }

  // 订单状态分布
  var statusCounts = { pending: 0, production: 0, completed: 0, cancelled: 0 };
  orders.forEach(function(o) { if (statusCounts[o.status] !== undefined) statusCounts[o.status]++; });
  var ctx2 = document.getElementById('chartStatus');
  if (ctx2) {
    chartInstances.status = new Chart(ctx2, {
      type: 'doughnut',
      data: {
        labels: ['待生产', '生产中', '已完成', '已取消'],
        datasets: [{ data: [statusCounts.pending, statusCounts.production, statusCounts.completed, statusCounts.cancelled], backgroundColor: ['#D4860B', '#0A7ABA', '#2E9E6B', '#9AA3B5'], borderWidth: 0 }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { padding: 16, usePointStyle: true } } } }
    });
  }
}

// 订单进度条
function renderProgressBar(order) {
  var stages = [
    { key: 'pending', label: '待确认' },
    { key: 'confirmed', label: '设计中' },
    { key: 'production', label: '生产中' },
    { key: 'quality', label: '质检' },
    { key: 'completed', label: '完成' }
  ];
  var curStatus = order.status || 'pending';
  var curIdx = { pending: 0, confirmed: 1, production: 2, quality: 3, completed: 4, cancelled: -1 }[curStatus] || 0;
  if (order.status === 'cancelled') return '<span style="color:var(--gray-400);font-size:12px">已取消</span>';
  var html = '<div class="progress-steps">';
  stages.forEach(function(s, i) {
    var cls = '';
    if (curIdx === i) cls = 'active';
    else if (i < curIdx) cls = 'done';
    html += '<div class="progress-step ' + cls + '"><div class="step-dot">' + (i < curIdx ? '✓' : (i + 1)) + '</div><div class="step-label">' + s.label + '</div></div>';
  });
  html += '</div>';
  return html;
}

function saveCustomer(id) {
  var name = document.getElementById('c_name').value.trim();
  if (!name) { alert('请输入客户名称'); return; }
  var data = {
    name: name,
    contact: (document.getElementById('c_contact').value||'').trim(),
    phone: (document.getElementById('c_phone').value||'').trim(),
    email: (document.getElementById('c_email').value||'').trim(),
    type: document.getElementById('c_type').value,
    level: document.getElementById('c_level').value,
    address: (document.getElementById('c_address').value||'').trim(),
  };
  if (id) {
    data.balance = Number(document.getElementById('c_balance').value || 0);
    supabase.from('customers').update(data).eq('id', id).then(function(res) {
      if (res.error) { toast('保存失败：' + res.error.message, 'error'); return; }
      toast('客户信息已更新');
      closeModal('customerModal');
      renderCustomers();
    });
  } else {
    supabase.from('customers').select('id').order('id', { ascending: false }).limit(1).then(function(res) {
      var maxId = 0;
      if (res.data && res.data.length) {
        var n = parseInt((res.data[0].id||'').replace('C',''));
        if (!isNaN(n)) maxId = n;
      }
      data.id = 'C' + String(maxId + 1).padStart(3, '0');
      data.balance = 0;
      data.created_at = new Date().toISOString();
      data.created_by = currentUser.email; // RLS：记录创建者
      supabase.from('customers').insert([data]).then(function(r2) {
        if (r2.error) { toast('保存失败：' + r2.error.message, 'error'); return; }
        toast('客户添加成功');
        closeModal('customerModal');
        renderCustomers();
      });
    });
  }
}

function deleteCustomer(id) {
  if (!confirm('确认删除该客户？')) return;
  supabase.from('customers').delete().eq('id', id).then(function(res) {
    if (res.error) { toast('删除失败：' + res.error.message, 'error'); return; }
    toast('客户已删除');
    renderCustomers();
  });
}

            '<div id="orderTotal" style="text-align:right;margin-top:16px;font-size:15px;font-weight:600;color:var(--gray-800)">合计：¥0.00</div>' +

          '</div>' +

}

function orderItemRow(services, item, idx) {
  var selHtml = '<option value="">选择服务项目</option>';
  services.forEach(function(s) {
    var val = JSON.stringify({ id: s.id, name: s.name, price: s.price }).replace(/"/g, '&quot;');
    selHtml += '<option value="' + val + '" ' + (item&&item.serviceId===s.id?'selected':'') + '>' + s.category + ' - ' + s.name + ' (¥' + s.price + ')</option>';
  });
  return '<div class="form-row order-item" style="align-items:end;margin-bottom:8px" data-idx="' + idx + '">' +
    '<div class="form-field"><select class="item-service" onchange="onOrderItemChange(' + idx + ')">' + selHtml + '</select></div>' +
    '<div class="form-field" style="flex:0 0 80px"><input type="number" class="item-qty" value="' + (item?item.qty:1) + '" min="1" onchange="recalcOrderTotal()"></div>' +
    '<div class="form-field" style="flex:0 0 100px"><input type="number" class="item-price" value="' + (item?item.price:'') + '" onchange="recalcOrderTotal()"></div>' +
    '<div class="form-field" style="flex:0 0 90px"><span style="font-size:13px;color:var(--gray-600)" id="itemSubtotal' + idx + '">' + (item?fmtMoney(item.subtotal):'¥0.00') + '</span></div>' +
    '<button class="btn btn-ghost btn-sm" style="color:var(--danger);margin-bottom:8px" onclick="this.closest(\'.order-item\').remove();recalcOrderTotal()">删除</button>' +
  '</div>';
}

function addOrderItemRow() {
  supabase.from('services').select('*').order('category,name').then(function(res) {
    var services = res.data || [];
    var container = document.getElementById('orderItems');
    if (!container) return;
    var idx = document.querySelectorAll('.order-item').length;
    var div = document.createElement('div');
    div.className = 'form-row order-item';
    div.setAttribute('data-idx', idx);
    div.style.alignItems = 'end';
    div.style.marginBottom = '8px';
    var selHtml = '<option value="">选择服务项目</option>';
    services.forEach(function(s) {
      var val = JSON.stringify({ id: s.id, name: s.name, price: s.price }).replace(/"/g, '&quot;');
      selHtml += '<option value="' + val + '">' + s.category + ' - ' + s.name + ' (¥' + s.price + ')</option>';
    });
    div.innerHTML = '<div class="form-field"><select class="item-service" onchange="onOrderItemChange(' + idx + ')">' + selHtml + '</select></div>' +
      '<div class="form-field" style="flex:0 0 80px"><input type="number" class="item-qty" value="1" min="1" onchange="recalcOrderTotal()"></div>' +
      '<div class="form-field" style="flex:0 0 100px"><input type="number" class="item-price" value="0" onchange="recalcOrderTotal()"></div>' +
      '<div class="form-field" style="flex:0 0 90px"><span style="font-size:13px;color:var(--gray-600)" id="itemSubtotal' + idx + '">¥0.00</span></div>' +
      '<button class="btn btn-ghost btn-sm" style="color:var(--danger);margin-bottom:8px" onclick="this.closest(\'.order-item\').remove();recalcOrderTotal()">删除</button>';
    if (container.innerHTML.indexOf('暂无项目') >= 0) container.innerHTML = '';
    container.appendChild(div);
  });
}

function onOrderItemChange(idx) {
  var row = document.querySelector('.order-item[data-idx="' + idx + '"]');
  if (!row) return;
  var sel = row.querySelector('.item-service');
  var priceInput = row.querySelector('.item-price');
  try {
    var val = sel.value;
    if (val) {
      var obj = JSON.parse(val.replace(/&quot;/g, '"'));
      priceInput.value = obj.price;
    }
  } catch(e) {}
  recalcOrderTotal();
}

function recalcOrderTotal() {
  var rows = document.querySelectorAll('.order-item');
  var total = 0;
  rows.forEach(function(row) {
    var qty = Number(row.querySelector('.item-qty').value || 0);
    var price = Number(row.querySelector('.item-price').value || 0);
    var sub = qty * price;
    total += sub;
    var idx = row.getAttribute('data-idx');
    var subEl = document.getElementById('itemSubtotal' + idx);
    if (subEl) subEl.textContent = fmtMoney(sub);
  });
  var totalEl = document.getElementById('orderTotal');
  if (totalEl) totalEl.textContent = '合计：' + fmtMoney(total);
}

function saveOrder(id) {
  var customerId = document.getElementById('o_customer').value;
  if (!customerId) { alert('请选择客户'); return; }
  var rows = document.querySelectorAll('.order-item');
  if (!rows.length) { alert('请至少添加一个订单项目'); return; }
  var items = [];
  rows.forEach(function(row) {
    var sel = row.querySelector('.item-service');
    var qty = Number(row.querySelector('.item-qty').value || 0);
    var price = Number(row.querySelector('.item-price').value || 0);
    try {
      var val = sel.value;
      if (val) {
        var obj = JSON.parse(val.replace(/&quot;/g, '"'));
        items.push({ serviceId: obj.id, name: obj.name, unit: '', qty: qty, price: price, subtotal: qty * price });
      }
    } catch(e) {}
  });
  var subtotal = 0;
  items.forEach(function(i) { subtotal += i.subtotal; });
  supabase.from('customers').select('name').eq('id', customerId).single().then(function(cRes) {
    var customerName = cRes.data ? cRes.data.name : '';
    var orderData = {
      customer_id: customerId,
      customer_name: customerName,
      status: document.getElementById('o_status').value,
      due_date: document.getElementById('o_due_date').value ? new Date(document.getElementById('o_due_date').value).toISOString() : null,
      items: items,
      subtotal: subtotal,
      discount: 0,
      total: subtotal,
      paid: id ? 0 : 0,
      balance: subtotal,
      remark: (document.getElementById('o_remark').value||'').trim(),
    };
    if (id) {
      supabase.from('orders').update(orderData).eq('id', id).then(function(res) {
        if (res.error) { toast('保存失败：' + res.error.message, 'error'); return; }
        toast('订单已更新');
        addNotification('订单 ' + id + ' 已更新');
        closeModal('orderModal');
        renderOrders();
      });
    } else {
      supabase.from('orders').select('id').order('id', { ascending: false }).limit(1).then(function(r2) {
        var maxId = 0;
        if (r2.data && r2.data.length) {
          var n = parseInt((r2.data[0].id||'').replace('ORD',''));
          if (!isNaN(n)) maxId = n;
        }
        orderData.id = 'ORD' + String(maxId + 1).padStart(7, '0');
        orderData.paid = 0;
        orderData.balance = subtotal;
        orderData.created_at = new Date().toISOString();
        orderData.created_by = currentUser.email; // RLS：记录创建者
        supabase.from('orders').insert([orderData]).then(function(r3) {
          if (r3.error) { toast('保存失败：' + r3.error.message, 'error'); return; }
          toast('订单创建成功');
          addNotification('新订单 ' + orderData.id + ' 已创建（客户：' + customerName + '）');
          closeModal('orderModal');
          renderOrders();
        });
      });
    }
  });
}

function deleteOrder(id) {
  if (!confirm('确认删除该订单？')) return;
  supabase.from('orders').delete().eq('id', id).then(function(res) {
    if (res.error) { toast('删除失败：' + res.error.message, 'error'); return; }
    toast('订单已删除');
    renderOrders();
  });
}

function renderFinance() {
  var content = document.getElementById('pageContent');
  content.innerHTML = '<div class="loading-mask">加载中...</div>';

  Promise.all([
    supabase.from('orders').select('id,customer_name,total,paid,balance,status').order('created_at', { ascending: false }),
    supabase.from('payments').select('*').order('created_at', { ascending: false })
  ]).then(function(results) {
    var orders = (results[0].data || []).filter(function(o) { return o.balance > 0; });
    var payments = results[1].data || [];

    var totalReceivable = 0;
    orders.forEach(function(o) { totalReceivable += o.balance; });
    var totalReceived = 0;
    payments.forEach(function(p) { totalReceived += Number(p.amount || 0); });

    var html = '<div class="stats-grid">' +
      statCard('未结清订单', orders.length, '#D4860B', 'orders') +
      statCard('待收金额', fmtMoney(totalReceivable), '#DC3545', 'receivable') +
      statCard('收款记录', payments.length, '#2E9E6B', 'money') +
      statCard('累计收款', fmtMoney(totalReceived), '#3B6DE8', 'money') +
    '</div>' +
    '<div style="display:flex;gap:8px;margin-bottom:16px">' +
      '<button class="btn btn-outline btn-sm" onclick="printCurrentPage()">🖨️ 打印</button>' +
      '<button class="btn btn-outline btn-sm" onclick="exportCSV(null,\'财务报表\')">📥 导出CSV</button>' +
    '</div>' +

    '<div class="card">' +
      '<div class="card-title">待收款订单</div>' +
      '<div class="table-wrap">' +
        '<table><thead><tr><th>订单号</th><th>客户</th><th>总金额</th><th>已付</th><th>未结</th><th>操作</th></tr></thead><tbody>';
    if (orders.length) {
      orders.forEach(function(o) {
        html += '<tr>' +
          '<td><strong>' + o.id + '</strong></td>' +
          '<td>' + (o.customer_name||'-') + '</td>' +
          '<td>' + fmtMoney(o.total) + '</td>' +
          '<td>' + fmtMoney(o.paid) + '</td>' +
          '<td style="color:var(--danger);font-weight:500">' + fmtMoney(o.balance) + '</td>' +
          '<td><button class="btn btn-primary btn-sm" onclick="openPaymentModal(\'' + o.id + '\')">收 款</button></td>' +
        '</tr>';
      });
    } else {
      html += '<tr><td colspan="6"><div class="empty-state"><p>所有订单已结清</p></div></td></tr>';
    }
    html += '</tbody></table></div></div>';

    html += '<div class="card">' +
      '<div class="card-title">收款记录</div>' +
      '<div class="table-wrap">' +
        '<table><thead><tr><th>日期</th><th>订单号</th><th>客户</th><th>金额</th><th>方式</th><th>备注</th></tr></thead><tbody>';
    if (payments.length) {
      payments.forEach(function(p) {
        html += '<tr><td>' + fmtDate(p.created_at) + '</td><td>' + (p.order_id||'-') + '</td><td>' + (p.customer_name||'-') + '</td><td style="font-weight:500;color:var(--success)">+' + fmtMoney(p.amount) + '</td><td>' + (p.method||'-') + '</td><td>' + (p.note||'-') + '</td></tr>';
      });

    }
    html += '</tbody></table></div></div>';

    content.innerHTML = html;

function openPaymentModal(orderId) {

          '<span class="modal-title">订单收款 - ' + order.id + '</span>' +

        '</div>' +

          '<div style="margin-bottom:12px;font-size:13px;color:var(--gray-600)">客户：' + (order.customer_name||'') + ' | 未结余额：<strong style="color:var(--danger)">' + fmtMoney(order.balance) + '</strong></div>' +
          '<div class="form-row">' +
            '<div class="form-field"><label>收款金额 <span class="required">*</span></label><input type="number" id="p_amount" value="' + order.balance + '" step="0.01" min="0" max="' + order.balance + '"></div>' +
            '<div class="form-field"><label>收款方式</label>' +

function savePayment(orderId) {
  var amount = Number(document.getElementById('p_amount').value || 0);
  if (!amount || amount <= 0) { alert('请输入有效金额'); return; }
  supabase.from('orders').select('*').eq('id', orderId).single().then(function(res) {
    var order = res.data;
    if (!order) return;
    if (amount > order.balance) { alert('收款金额不能大于未结余额'); return; }

    supabase.from('payments').select('id').order('id', { ascending: false }).limit(1).then(function(r2) {
      var maxId = 0;
      if (r2.data && r2.data.length) {
        var n = parseInt((r2.data[0].id||'').replace('PAY',''));
        if (!isNaN(n)) maxId = n;
      }
      var payment = {
        id: 'PAY' + String(maxId + 1).padStart(3, '0'),
        order_id: orderId,
        customer_name: order.customer_name,
        amount: amount,
        method: document.getElementById('p_method').value,
        note: (document.getElementById('p_note').value||'').trim(),
        created_at: new Date().toISOString(),
        created_by: currentUser.email, // RLS：记录创建者
      };
      var newPaid = Number(order.paid || 0) + amount;
      var newBalance = Number(order.total || 0) - newPaid;
      var newStatus = newBalance <= 0 ? 'completed' : order.status;

      supabase.from('payments').insert([payment]).then(function(r3) {
        if (r3.error) { toast('收款失败：' + r3.error.message, 'error'); return; }
        supabase.from('orders').update({ paid: newPaid, balance: newBalance, status: newStatus }).eq('id', orderId).then(function(r4) {
          if (r4.error) { toast('更新订单失败：' + r4.error.message, 'error'); return; }
          supabase.from('customers').select('balance,id').eq('id', order.customer_id).single().then(function(r5) {
            if (r5.data) {
              supabase.from('customers').update({ balance: Math.max(0, Number(r5.data.balance || 0) - amount) }).eq('id', order.customer_id);
            }
            closeModal('paymentModal');
            toast('收款成功，已收 ' + fmtMoney(newPaid) + ' / ' + fmtMoney(order.total));
            renderFinance();
          });
        });
      });
    });
  });
}
</script>
</body>
</html>
